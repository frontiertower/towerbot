name: Trigger auto deployment for ca-berlinbot-prod

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/ca-berlinbot-prod-AutoDeployTrigger-30402c0b-d223-4001-bf8c-50c5a87620f4.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CABERLINBOTPROD_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CABERLINBOTPROD_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CABERLINBOTPROD_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: crsgprod.azurecr.io
          registryUsername: ${{ secrets.CABERLINBOTPROD_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CABERLINBOTPROD_REGISTRY_PASSWORD }}
          containerAppName: ca-berlinbot-prod
          resourceGroup: rg-sg-prod
          imageToBuild: crsgprod.azurecr.io/ca-berlinbot-prod:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


